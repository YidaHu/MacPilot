name: Swift

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Test
        run: swift test
      - name: Build
        run: swift build
